<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Mi5</title>
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="robots" content="noindex,nofollow">
  <link rel="stylesheet" href="style.css">
</head>

<body class="lock">

  <!-- Background layers -->
  <div class="camera-parallax"></div>
  <div class="light-beam"></div>

  <header class="top-bar">
    <nav class="top-links">
      <a href="https://www.instagram.com/mi5.vu/" target="_blank">[IG]</a>
      <a href="https://www.pinterest.com/MI5vu/" target="_blank">[PIN]</a>
    </nav>
  </header>

  <main class="wrap">

    <div class="logo-img">
      <div class="logo-shell">
        <a href="https://www.imvu.com/shop/web_search.php?manufacturers_id=106440837" target="_blank">
          <img src="logo.png" alt="Mi5 logo">
        </a>

        <div class="logo-bg-mask"></div>
        <div class="logo-light-sweep"></div>
        <div class="logo-grime"></div>
      </div>
    </div>

  </main>

  <footer>
    <div class="warning">all theft will result in dmca consequences</div>
    <div class="copyright">© 2026 all rights reserved</div>
  </footer>

<script>
/* Parallax scroll */
document.addEventListener("scroll", () => {
  const depth = window.scrollY * 0.05;
  document.documentElement.style.setProperty("--scrollDepth", depth + "px");
});

/* Detect iframe mode */
if (window.self !== window.top) {
  document.body.classList.add("iframe-mode");
}
</script>

</body>
</html>
